<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>FlowMind</title>
    <meta name="description" content="FlowMind — real-time meeting copilot with live transcription and AI insights." />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="FlowMind" />
    <meta property="og:description" content="Real-time meeting copilot with live transcription and AI insights." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="FlowMind" />
    <meta name="twitter:description" content="Real-time meeting copilot with live transcription and AI insights." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
      // Read the persisted theme BEFORE React mounts to avoid a light flash
      // on first paint. Defaults to dark.
      (function () {
        try {
          var t = localStorage.getItem("flowmind-theme") || "dark";
          var prefDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
          var resolved = t === "system" ? (prefDark ? "dark" : "light") : t;
          document.documentElement.classList.remove("light", "dark");
          document.documentElement.classList.add(resolved);
        } catch (e) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
